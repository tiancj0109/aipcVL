server {
    listen 80;
    server_name localhost;

    # Frontend Static Assets Deployment
    # Deployed under /aipcvl/ subpath
    location /aipcvl/ {
        alias /path/to/frontend/dist/; # Update this to the actual absolute path of the built dist/ folder
        try_files $uri $uri/ /aipcvl/index.html;
        index index.html;
    }

    # API Proxy for FastAPI Backend
    location /aipcvl-api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
